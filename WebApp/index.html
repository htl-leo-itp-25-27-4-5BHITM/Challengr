<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Challengr WebApp</title>
  </head>
  <body>
    <iframe
      id="map-frame"
      src="/map.html"
      style="border:0; width:100vw; height:100vh;"
    ></iframe>

    <script>
      const frame = document.getElementById("map-frame");
      if (frame && window.location.search) {
        frame.src = `/map.html${window.location.search}`;
      }
    </script>
  </body>
</html>
