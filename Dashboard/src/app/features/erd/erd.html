<div class="topbar">
  <h1>ERD</h1>
  <p class="subtitle">Datenbank-Schema (nur Metadaten, keine Inhalte)</p>
</div>

<div *ngIf="!erd(); else erdLoaded" class="card">
  <div class="muted">Lade Schema…</div>
</div>

<ng-template #erdLoaded>
  <div class="diagramHeader">Klassendiagramm</div>
  <div #diagramContainer class="diagram" [innerHTML]="renderedSvg()"></div>
  <div class="hint" *ngIf="!renderedSvg()">
    <span class="muted">Renderer nicht verfügbar – Mermaid-Code wird nicht angezeigt.</span>
  </div>

  <div class="tableData" *ngIf="selectedTable() as selected">
    <div class="tableDataHeader">Inhalt: {{ selected }}</div>
    <div class="muted" *ngIf="tableLoading()">Lade Daten…</div>
    <div class="muted" *ngIf="tableError()">{{ tableError() }}</div>

    <div class="empty" *ngIf="!tableLoading() && !tableError() && (!tableData() || tableData()?.rows?.length === 0)">
      Keine Einträge vorhanden.
    </div>

    <div class="dataTable" *ngIf="!tableLoading() && tableData() && tableData()?.rows?.length">
      <div class="dataHeader">
        <div class="cell" *ngFor="let col of tableData()?.columns">{{ col }}</div>
      </div>
      <div class="dataRow" *ngFor="let row of tableData()?.rows">
        <div class="cell" *ngFor="let col of tableData()?.columns">
          {{ row[col] ?? '-' }}
        </div>
      </div>
    </div>
  </div>
</ng-template>
