<div class="layout">

  <div class="sidebar">

    <div
      class="card category"
      *ngFor="let c of categories()"
      (click)="selectCategory(c)"
      [class.active]="selectedCategory === c.name"
    >
      <div class="title">{{ c.name }}</div>

      <div class="meta">
        {{ c.count }} Challenges
      </div>

    </div>

  </div>

  <div class="content">

    <div class="card">

      <div class="header">
        <h2>{{ selectedCategory || 'Wähle eine Kategorie' }}</h2>
      </div>

      <div class="list">

        <div class="row" *ngFor="let c of getSelected()">

          <div class="text">
            {{ c.text }}
          </div>

          <div class="badge">
            {{ c.category }}
          </div>

        </div>

      </div>

    </div>

  </div>

</div>
