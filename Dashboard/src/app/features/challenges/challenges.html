<div class="layout">

  <div class="sidebar">

    <div class="sidebar-top">
      <button class="create-btn" (click)="openModal()">
        + Challenge erstellen
      </button>
    </div>

    <div
      class="card category"
      *ngFor="let c of categories()"
      (click)="selectCategory(c)"
      [class.active]="selectedCategory === c.name"
    >
      <div class="title">{{ c.name }}</div>

      <div class="meta">
        {{ c.count }} Challenges
      </div>

    </div>

  </div>

  <div class="content">

    <div class="card">

      <div class="header">
        <h2>{{ selectedCategory || 'Wähle eine Kategorie' }}</h2>
      </div>

      <div class="list">

        <div class="row" *ngFor="let c of getSelected()">

          <div class="text">
            {{ c.text }}
          </div>

          <div class="badge">
            {{ c.category }}
          </div>

        </div>

      </div>

    </div>

  </div>

</div>

<!-- MODAL -->

<div class="modal-backdrop" *ngIf="showModal" (click)="closeModal()">

  <div class="modal" (click)="$event.stopPropagation()">

    <div class="modal-header">
      <h2>Challenge erstellen</h2>

      <button class="close-btn" (click)="closeModal()">
        ✕
      </button>
    </div>

    <div class="form">

      <label>
        <div class="meta">Kategorie</div>

        <select [(ngModel)]="createCategory">
          <option value="">Bitte wählen</option>

          <option
            *ngFor="let cat of categories()"
            [value]="cat.name"
          >
            {{ cat.name }}
          </option>

        </select>

      </label>

      <label>
        <div class="meta">Text</div>

        <textarea
          rows="4"
          placeholder="Challenge Text"
          [(ngModel)]="createText"
        ></textarea>

      </label>

      <div *ngIf="isWissenSelected" class="wissen-box">

        <div class="meta">Antworten</div>

        <div class="answers-grid">
          <input type="text" placeholder="Option A" [(ngModel)]="createChoices[0]" />
          <input type="text" placeholder="Option B" [(ngModel)]="createChoices[1]" />
          <input type="text" placeholder="Option C" [(ngModel)]="createChoices[2]" />
          <input type="text" placeholder="Option D" [(ngModel)]="createChoices[3]" />
        </div>

        <label>
          <div class="meta">Richtige Antwort</div>

          <select [(ngModel)]="createCorrectIndex">
            <option [ngValue]="0">A</option>
            <option [ngValue]="1">B</option>
            <option [ngValue]="2">C</option>
            <option [ngValue]="3">D</option>
          </select>

        </label>

      </div>

      <div *ngIf="createError" class="error">
        {{ createError }}
      </div>

      <button class="submit-btn" (click)="createChallenge()" [disabled]="isCreating">
        {{ isCreating ? 'Erstelle...' : 'Erstellen' }}
      </button>

    </div>

  </div>

</div>
