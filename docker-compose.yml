services:
  postgres:
    profiles: ["local-stack"]
    image: postgres:17-alpine
    container_name: challengr-postgres
    environment:
      POSTGRES_DB: postgres
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - challengr-network

  backend:
    profiles: ["local-stack"]
    build:
      context: ./Backend/challengrbackend
      dockerfile: src/main/docker/Dockerfile.txt
    container_name: challengr-backend
    environment:
      QUARKUS_DATASOURCE_JDBC_URL: jdbc:postgresql://postgres:5432/postgres
      QUARKUS_DATASOURCE_USERNAME: postgres
      QUARKUS_DATASOURCE_PASSWORD: postgres
      QUARKUS_PROFILE: prod
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - challengr-network

  webapp:
    image: node:20-alpine
    container_name: challengr-webapp
    working_dir: /app
    volumes:
      - ./WebApp:/app
      - webapp_node_modules:/app/node_modules
    ports:
      - "5173:5173"
    command: sh -c "npm install && npm run dev"
    environment:
      VITE_PROXY_TARGET: ${VITE_PROXY_TARGET:-https://it220257.cloud.htl-leonding.ac.at}
      VITE_WS_PROXY_TARGET: ${VITE_WS_PROXY_TARGET:-wss://it220257.cloud.htl-leonding.ac.at}
    networks:
      - challengr-network

volumes:
  postgres_data:
  webapp_node_modules:

networks:
  challengr-network:
    driver: bridge
