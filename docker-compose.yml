services:
  postgres:
    profiles: ["local-stack"]
    image: postgres:17-alpine
    container_name: challengr-postgres
    environment:
      POSTGRES_DB: postgres
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - challengr-network

  backend:
    profiles: ["local-stack"]
    build:
      context: ./Backend/challengrbackend
      dockerfile: src/main/docker/Dockerfile.txt
    container_name: challengr-backend
    environment:
      QUARKUS_DATASOURCE_JDBC_URL: jdbc:postgresql://postgres:5432/postgres
      QUARKUS_DATASOURCE_USERNAME: postgres
      QUARKUS_DATASOURCE_PASSWORD: postgres
      QUARKUS_PROFILE: prod
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - challengr-network

  dashboard:
    image: node:20-alpine
    container_name: challengr-dashboard
    working_dir: /app
    volumes:
      - ./Dashboard:/app
      - dashboard_node_modules:/app/node_modules
    ports:
      - "4200:4200"
    command: sh -c "npm install && npm run start -- --host 0.0.0.0"
    networks:
      - challengr-network

  keycloak:
    image: quay.io/keycloak/keycloak:24.0
    command: start-dev
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
      KC_DB: dev-mem
    ports:
      - "9090:8080"
    profiles:
      - local-stack

volumes:
  postgres_data:
  dashboard_node_modules:

networks:
  challengr-network:
    driver: bridge
