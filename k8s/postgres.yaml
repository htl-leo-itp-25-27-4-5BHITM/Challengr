apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: challengr-postgres-pvc
  namespace: student-it220257
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: challengr-postgres
  namespace: student-it220257
spec:
  replicas: 1
  selector:
    matchLabels:
      app: challengr-postgres
  template:
    metadata:
      labels:
        app: challengr-postgres
    spec:
      containers:
        - name: postgres
          image: postgres:17-alpine
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_DB
              valueFrom:
                secretKeyRef:
                  name: challengr-secrets
                  key: POSTGRES_DB
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: challengr-secrets
                  key: POSTGRES_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: challengr-secrets
                  key: POSTGRES_PASSWORD
          volumeMounts:
            - name: postgres-storage
              mountPath: /var/lib/postgresql/data
      volumes:
        - name: postgres-storage
          persistentVolumeClaim:
            claimName: challengr-postgres-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: challengr-postgres-service
  namespace: student-it220257
spec:
  selector:
    app: challengr-postgres
  ports:
    - port: 5432
      targetPort: 5432
