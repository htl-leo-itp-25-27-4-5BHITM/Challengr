---
apiVersion: v1
kind: ConfigMap
metadata:
  name: challengr-theme-css
  namespace: student-it220257
data:
  styles.css: |
    /* Ultra Modern Dark Theme for Challengr */
    body, .login-pf-page { 
        background-color: #121212 !important; 
        background-image: none !important; 
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif !important;
        color: #ffffff !important;
    }
    .pf-v5-c-background-image, #kc-header-wrapper, .pf-v5-c-brand { display: none !important; }
    
    /* Dialog Box */
    .pf-v5-c-login, .pf-v5-c-login__container { background-color: transparent !important; }
    .pf-v5-c-login__main, .pf-v5-c-login__main-body, .card-pf { 
        background-color: #1e1e1e !important; 
        border-radius: 28px !important; 
        box-shadow: 0 20px 50px rgba(0,0,0,0.5) !important; 
        border: 1px solid #333 !important; 
        padding: 5% !important; 
        margin: 5vh auto !important;
    }
    
    /* Header / Title */
    .pf-v5-c-login__header { text-align: center !important; margin-bottom: 25px !important; }
    #kc-page-title, .pf-v5-c-title { color: #ffffff !important; font-weight: 700 !important; font-size: 22px !important; }
    #kc-page-title::before { 
        content: "CHALLENGR"; 
        display: block; margin-bottom: 12px; font-size: 14px; 
        letter-spacing: 4px; color: #ffcc00; font-weight: 800; 
    }
    
    /* Inputs */
    input[type="text"], input[type="password"], input[type="email"], .pf-v5-c-form-control {
        border-radius: 14px !important; 
        padding: 16px 20px !important; 
        height: auto !important; 
        background-color: #2c2c2e !important; 
        border: 1px solid #444 !important; 
        color: #ffffff !important; 
        font-size: 16px !important;
    }
    input[type="text"]:focus, input[type="password"]:focus, .pf-v5-c-form-control:focus {
        border-color: #ffcc00 !important; 
        box-shadow: 0 0 0 3px rgba(255, 204, 0, 0.2) !important; 
        outline: none !important;
    }
    
    /* Password Group Fix */
    .pf-v5-c-input-group {
        background-color: #2c2c2e !important;
        border-radius: 14px !important;
        border: 1px solid #444 !important;
        display: flex !important;
        align-items: center !important;
        overflow: hidden !important;
    }
    .pf-v5-c-input-group:focus-within {
        border-color: #ffcc00 !important;
        box-shadow: 0 0 0 3px rgba(255, 204, 0, 0.2) !important;
    }
    .pf-v5-c-input-group input.pf-v5-c-form-control {
        border: none !important;
        box-shadow: none !important;
        background-color: transparent !important;
        margin: 0 !important;
    }
    .pf-v5-c-input-group .pf-v5-c-button.pf-m-control {
        background-color: transparent !important;
        border: none !important;
        color: #aaaaaa !important;
    }

    /* Labels */
    .pf-v5-c-form__label-text, .control-label, label { 
        color: #aaaaaa !important; 
        font-weight: 500 !important; 
        font-size: 14px !important; 
        display: inline-block !important;
    }
    
    /* Button */
    button[type="submit"], input[type="submit"], .pf-v5-c-button.pf-m-primary, .btn-primary {
        background-color: #ffcc00 !important; 
        color: #121212 !important; 
        border-radius: 16px !important; 
        padding: 16px 20px !important; 
        font-weight: 800 !important; 
        font-size: 16px !important; 
        width: 100% !important; 
        text-transform: uppercase !important; 
        letter-spacing: 1px !important; 
        border: none !important; 
        margin-top: 15px !important; 
        cursor: pointer !important;
    }
    button[type="submit"]:hover, .pf-v5-c-button.pf-m-primary:hover { background-color: #e6b800 !important; }
    
    /* Social Logins */
    #kc-social-providers ul { 
        padding: 0 !important; 
        margin: 0 !important; 
        list-style: none !important; 
        display: flex !important;
        flex-direction: column !important;
        width: 100% !important;
        gap: 10px !important;
    }
    #kc-social-providers li { width: 100% !important; }
    #kc-social-providers a, .kc-social-provider-logo {
        background-color: #2c2c2e !important;
        color: #ffffff !important;
        border-radius: 16px !important;
        padding: 14px !important;
        font-weight: 600 !important;
        border: 1px solid #444 !important;
        font-size: 16px !important;
        display: flex !important;
        align-items: center !important;
        justify-content: center !important;
        width: 100% !important;
        box-sizing: border-box !important;
        text-decoration: none !important;
    }
    #kc-social-providers a:hover {
        background-color: #38383a !important;
    }
    #kc-social-providers .kc-social-icon-text {
        margin-left: 10px !important;
        color: #fff !important;
        font-weight: 700 !important;
    }

    /* SVG Icon specific overrides */
    #kc-social-providers svg.pf-v5-c-icon__content {
        fill: currentColor !important;
    }
    
    /* Divider */
    #kc-social-providers + hr, .pf-v5-c-divider { border-color: #333 !important; }
    .pf-v5-c-login__main-footer-band { border-top: 1px solid #333 !important; padding-top: 15px !important; margin-top: 20px !important; }
    
    /* Links */
    a { color: #ffcc00 !important; font-weight: 600 !important; text-decoration: none !important; }
    a:hover { text-decoration: underline !important; }
