quarkus.datasource.jdbc.url=${QUARKUS_DATASOURCE_JDBC_URL:jdbc:postgresql://localhost:5432/postgres}
quarkus.datasource.username=${QUARKUS_DATASOURCE_USERNAME:postgres}
quarkus.datasource.password=${QUARKUS_DATASOURCE_PASSWORD:postgres}
quarkus.datasource.db-kind=postgresql

quarkus.hibernate-orm.schema-management.strategy=drop-and-create
quarkus.hibernate-orm.sql-load-script=import.sql

quarkus.http.cors.enabled=true
quarkus.http.cors.origins=${QUARKUS_CORS_ORIGINS:http://localhost:5173,http://127.0.0.1:5173,*}
quarkus.http.cors.methods=GET,POST,PUT,DELETE,OPTIONS
quarkus.http.cors.headers=accept,authorization,content-type,x-requested-with
quarkus.http.cors.access-control-allow-credentials=true

# Keycloak / OIDC
quarkus.oidc.auth-server-url=${KEYCLOAK_URL:http://localhost:9090}/realms/challengr
quarkus.oidc.client-id=challengr-backend
quarkus.oidc.credentials.secret=${KEYCLOAK_CLIENT_SECRET:secret}
quarkus.oidc.application-type=service

# In Dev-Mode: OIDC deaktivieren (optional, zum Testen ohne Keycloak)
%dev.quarkus.oidc.enabled=false

